name: Build JARVIS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Install Rust via rustup directly — avoids dtolnay/rust-toolchain
      # network issues on GitHub Actions runners
      - name: Setup Rust (via rustup)
        shell: pwsh
        run: |
          # Rust is pre-installed on windows-latest; just ensure stable + target
          rustup toolchain install stable --no-self-update
          rustup default stable
          rustup target add x86_64-pc-windows-msvc
          rustc --version
          cargo --version

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "JARVIS v__VERSION__"
          releaseBody: |
            ## JARVIS System Monitor
            
            ### Kurulum / Install
            - `JARVIS_x.x.x_x64-setup.exe` → Installer (önerilen)
            - `JARVIS_x.x.x_x64.msi` → MSI paketi
            
            ### Notlar
            - Python 3 kurulu ise Image Tools CLI çalışır
            - `pip install opencv-python Pillow numpy` gereklidir
          releaseDraft: false
          prerelease: false
